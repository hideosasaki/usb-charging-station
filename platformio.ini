; PlatformIO Project Configuration File
; USB Charging Station — Waveshare RP2040-Zero

[env:waveshare_rp2040_zero]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = waveshare_rp2040_zero
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m

; Earle Philhower core enables USB CDC by default. Do NOT add -DUSE_TINYUSB:
; it disables the built-in CDC and breaks picotool / serial enumeration.

; TFT_eSPI configuration is fully expressed via build_flags so the bundled
; User_Setup.h is ignored (USER_SETUP_LOADED=1). The panel lives entirely on
; the board's left edge: SCK=GP14, MOSI=GP15, CS=GP26, DC=GP27, BL=GP28.
; GP14/GP15 are the SPI1 SCK/TX default pins, so TFT_SPI_PORT=1 routes the
; transfer through SPI1; CS/DC/BL are soft-driven GPIOs. RST is tied to 3V3
; (TFT_RST=-1, soft-reset cmd is issued by tft.init()). MISO is unwired
; (write-only path; readPixel APIs are unavailable). SPI runs at 10 MHz:
; the breadboard wiring does not reliably initialize the panel at 40 MHz,
; and 10 MHz already keeps the 10 Hz full-frame redraw smooth.
build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_SPI_PORT=1
    -DTFT_MISO=-1
    -DTFT_MOSI=15
    -DTFT_SCLK=14
    -DTFT_CS=26
    -DTFT_DC=27
    -DTFT_RST=-1
    -DTFT_BL=28
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=10000000
    -DSPI_READ_FREQUENCY=20000000
    -DUSE_MOCK_PORTS=1

; Flash over USB: 1200bps touch reboots the running firmware into BOOTSEL,
; then picotool loads the image (make upload / make upload-hw).
upload_protocol = picotool

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
    bodmer/TFT_eSPI @ ^2.5.43

; Same target as the default env but switches make_port_reader() over to
; the SW3518 implementation. Use this to flash a board that has real
; SW3518 chips wired up. SW3518_PORT_COUNT controls how many chips the
; factory exposes.
;
; build_flags is redefined in full (not extended) because PlatformIO would
; otherwise carry over the parent's -DUSE_MOCK_PORTS=1, and the trailing
; -DUSE_MOCK_PORTS=0 only redefines the macro for the compiler driver;
; in practice the parent value won the build, silently linking mock_port_reader
; instead of the SW3518 driver.
[env:waveshare_rp2040_zero_hw]
extends = env:waveshare_rp2040_zero
build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_SPI_PORT=1
    -DTFT_MISO=-1
    -DTFT_MOSI=15
    -DTFT_SCLK=14
    -DTFT_CS=26
    -DTFT_DC=27
    -DTFT_RST=-1
    -DTFT_BL=28
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=10000000
    -DSPI_READ_FREQUENCY=20000000
    -DUSE_MOCK_PORTS=0
    -DSW3518_PORT_COUNT=1

; Host-side unit tests for hardware-independent code (PortHistory, mock
; scenarios, ChargeAnalyzer, SessionStats). Run with: pio test -e native
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<port_history.cpp> +<mock_port_reader.cpp> +<charge_analyzer.cpp> +<session_stats.cpp> +<serial_cmd.cpp>
build_flags =
    -std=gnu++17
    -DUNIT_TEST=1
    -DUSE_MOCK_PORTS=1
