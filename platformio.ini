; PlatformIO Project Configuration File
; USB Charging Station — Waveshare RP2040-Zero
;
; Build on Mac, flash via Raspberry Pi Zero W (see scripts/upload-via-pi.sh).

[env:waveshare_rp2040_zero]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = waveshare_rp2040_zero
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m

; Earle Philhower core enables USB CDC by default. Do NOT add -DUSE_TINYUSB:
; it disables the built-in CDC and breaks picotool / serial enumeration.

; TFT_eSPI configuration is fully expressed via build_flags so the bundled
; User_Setup.h is ignored (USER_SETUP_LOADED=1). Pin assignment matches the
; project pinout: SCK=GP6, MOSI=GP7, CS=GP8, DC=GP14, BL=GP15. RST is tied
; to 3V3 (TFT_RST=-1, soft-reset cmd is issued by tft.init()). MISO is
; unwired (write-only path; readPixel APIs are unavailable).
build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=-1
    -DTFT_MOSI=7
    -DTFT_SCLK=6
    -DTFT_CS=8
    -DTFT_DC=14
    -DTFT_RST=-1
    -DTFT_BL=15
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DUSE_MOCK_PORTS=1

; Local fallback: Mac direct USB → picotool. Normal flow uses scripts/upload-via-pi.sh via Makefile.
upload_protocol = picotool

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
    bodmer/TFT_eSPI @ ^2.5.43

; Host-side unit tests for hardware-independent code (PortHistory, mock
; scenarios, ChargeAnalyzer, SessionStats). Run with: pio test -e native
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<port_history.cpp>
build_flags =
    -std=gnu++17
    -DUNIT_TEST=1
    -DUSE_MOCK_PORTS=1
