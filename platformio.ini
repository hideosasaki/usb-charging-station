; PlatformIO Project Configuration File
; USB Charging Station — Waveshare RP2040-Zero
;
; Phase 0: Blink + Serial sanity check.
; Build on Mac, flash via Raspberry Pi Zero W (see scripts/upload-via-pi.sh).

[env:waveshare_rp2040_zero]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = waveshare_rp2040_zero
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m

; Earle Philhower core enables USB CDC by default; no extra build_flags needed.

; Local fallback: Mac direct USB → picotool. Normal flow uses scripts/upload-via-pi.sh via Makefile.
upload_protocol = picotool

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
